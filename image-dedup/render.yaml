services:
  - type: web
    name: image-dedup
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 4 -b 0.0.0.0:$PORT app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: working-images
      mountPath: /opt/render/project/src/working
      sizeGB: 1
