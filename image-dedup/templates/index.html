<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片查重工具 - SKU版</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 图片查重工具</h1>
            <p>输入图片链接，检查是否与库中图片重复，输出重复 SKU</p>
        </header>

        <main>
            <!-- URL 查重 -->
            <section class="check-section">
                <h2>🔗 链接查重</h2>
                <div class="input-group">
                    <input type="url" id="imageUrl" placeholder="https://example.com/image.jpg" />
                    <button onclick="checkImage()">开始查重</button>
                </div>
                <div id="checkResult"></div>
            </section>

            <!-- 本地上传 -->
            <section class="upload-section">
                <h2>📤 上传新图片</h2>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept="image/*" onchange="uploadImage()" />
                    <p>点击或拖拽图片到这里上传</p>
                </div>
                <div id="uploadResult"></div>
            </section>

            <!-- 图片库 -->
            <section class="gallery-section">
                <h2>📁 图片库 <span id="imageCount">(加载中...)</span></h2>
                <div id="imageGallery" class="gallery"></div>
            </section>
        </main>
    </div>

    <script>
        // 页面加载时获取图片列表
        window.onload = loadGallery;

        async function checkImage() {
            const url = document.getElementById('imageUrl').value.trim();
            const resultDiv = document.getElementById('checkResult');
            
            if (!url) {
                resultDiv.innerHTML = '<div class="alert alert-error">请输入图片链接</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="loading">正在分析...</div>';

            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (data.error) {
                    resultDiv.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
                    return;
                }

                let html = '';
                
                if (data.is_duplicate) {
                    html += `<div class="alert alert-warning">
                        ⚠️ ${data.message}
                        <br><small>目标图片哈希: ${data.target_hash}</small>
                    </div>`;
                    
                    // 显示重复的 SKU 列表
                    if (data.duplicate_skus && data.duplicate_skus.length > 0) {
                        html += `<div class="sku-box"><h3>🎯 重复的 SKU (${data.duplicate_count}个)</h3><ul>`;
                        data.duplicate_skus.forEach(sku => {
                            html += `<li class="sku-item"><strong>${sku}</strong></li>`;
                        });
                        html += '</ul></div>';
                    }
                    
                    // 显示详细匹配信息
                    html += '<div class="matches"><h3>📋 详细匹配结果</h3>';
                    data.matches.forEach(match => {
                        const skuBadge = match.sku !== 'UNKNOWN' 
                            ? `<span class="sku-badge">SKU: ${match.sku}</span>` 
                            : '<span class="sku-badge unknown">SKU: 未知</span>';
                        
                        html += `
                            <div class="match-item">
                                <div class="match-info">
                                    <div>
                                        <strong>${match.filename}</strong>
                                        ${skuBadge}
                                    </div>
                                    <span class="similarity">${match.similarity.toFixed(1)}%</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${match.similarity}%"></div>
                                </div>
                                <div class="match-hash">
                                    <small>哈希: ${match.hash.substring(0, 16)}... | 差异: ${match.hash_diff}</small>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                } else {
                    html += `<div class="alert alert-success">
                        ✅ ${data.message}
                        <br><small>目标图片哈希: ${data.target_hash}</small>
                    </div>`;
                }

                resultDiv.innerHTML = html;

            } catch (error) {
                resultDiv.innerHTML = `<div class="alert alert-error">请求失败: ${error.message}</div>`;
            }
        }
